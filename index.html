<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CTF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mini CTF</h1>
    <div class="player-bar">
      <span class="identity">Team <strong id="team-label">—</strong></span>
      <span class="identity">Player <strong id="player-label">—</strong></span>
      <span id="player-score" class="score-badge">0 pts</span>
    </div>
  </header>

  <main>
    <section id="challenges-section">
      <h2>Challenges</h2>
      <div id="challenges"></div>
    </section>

    <section id="leaderboard-section">
      <div class="section-head">
        <h2>Leaderboard</h2>
        <button id="refresh-board" type="button">Refresh</button>
      </div>
      <div id="leaderboard">
        <p class="muted">Loading…</p>
      </div>
    </section>
  </main>

  <footer>
    <p class="muted">Static CTF · scores stored via Google Sheets</p>
  </footer>

  <div id="join-modal" class="modal-overlay" hidden>
    <form id="join-form" class="modal">
      <h2>Join the CTF 🚩</h2>
      <p class="muted">
        Pick a team and a player name. Teammates must type the
        <strong>exact same team name</strong>. You can't change these later.
      </p>
      <label>Team
        <input id="join-team" type="text" maxlength="32" required
               autocomplete="off" placeholder="team name">
      </label>
      <label>Player
        <input id="join-name" type="text" maxlength="32" required
               autocomplete="off" placeholder="your handle">
      </label>
      <button type="submit">Start hacking</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
